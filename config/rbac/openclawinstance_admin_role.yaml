# This rule is not used by the project openclaw-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over openclaw.nonnoalex.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openclaw-operator
    app.kubernetes.io/managed-by: kustomize
  name: openclawinstance-admin-role
rules:
- apiGroups:
  - openclaw.nonnoalex.dev
  resources:
  - openclawinstances
  verbs:
  - '*'
- apiGroups:
  - openclaw.nonnoalex.dev
  resources:
  - openclawinstances/status
  verbs:
  - get
