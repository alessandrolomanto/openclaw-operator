# This rule is not used by the project openclaw-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the openclaw.nonnoalex.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openclaw-operator
    app.kubernetes.io/managed-by: kustomize
  name: openclawinstance-editor-role
rules:
- apiGroups:
  - openclaw.nonnoalex.dev
  resources:
  - openclawinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - openclaw.nonnoalex.dev
  resources:
  - openclawinstances/status
  verbs:
  - get
