---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-manager
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps, persistentvolumeclaims, services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [openclaw.nonnoalex.dev]
    resources: [openclawinstances]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [openclaw.nonnoalex.dev]
    resources: [openclawinstances/finalizers]
    verbs: [update]
  - apiGroups: [openclaw.nonnoalex.dev]
    resources: [openclawinstances/status]
    verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-manager
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openclaw-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "openclaw-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openclaw-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openclaw-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "openclaw-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
